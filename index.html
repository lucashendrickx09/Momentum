<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0b0d" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f6f7fb" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Personal self-improvement tracker. All data stays on your device." />
    <title>Momentum</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: #f6f7fb;
        transition: opacity 0.4s ease;
      }
      @media (prefers-color-scheme: dark) {
        #splash { background: #0a0b0d; }
      }
      #splash.out { opacity: 0; pointer-events: none; }
      #splash svg {
        width: 96px;
        height: 96px;
        border-radius: 22px;
        animation: splash-pop 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      #splash .wordmark {
        font-family: system-ui, -apple-system, sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #10182a;
        animation: splash-rise 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      @media (prefers-color-scheme: dark) {
        #splash .wordmark { color: #eef2f8; }
      }
      @keyframes splash-pop {
        from { opacity: 0; transform: scale(0.7); }
        to { opacity: 1; transform: scale(1); }
      }
      @keyframes splash-rise {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <linearGradient id="s-bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#10182a"/>
            <stop offset="1" stop-color="#0b0f17"/>
          </linearGradient>
          <linearGradient id="s-mark" x1="0" y1="1" x2="1" y2="0">
            <stop offset="0" stop-color="#18b97a"/>
            <stop offset="0.5" stop-color="#19c3c3"/>
            <stop offset="1" stop-color="#4f8cff"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="112" fill="url(#s-bg)"/>
        <g fill="none" stroke="url(#s-mark)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="120,332 210,242 286,318 392,176"/>
          <polyline points="330,176 392,176 392,238"/>
        </g>
        <circle cx="120" cy="332" r="22" fill="#18b97a"/>
      </svg>
      <div class="wordmark">Momentum</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
