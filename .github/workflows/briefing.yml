name: Market briefing

on:
  schedule:
    # 20:00 UTC, Mon–Fri = ~04:00 Taiwan (UTC+8) Tue–Sat, after the US close.
    - cron: '0 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build briefing
        run: node scripts/build-briefing.mjs
        env:
          # Optional: set this repo secret to read tickers from your published
          # Google Sheet CSV. If unset, the job uses public/watchlist.json.
          SHEET_CSV_URL: ${{ secrets.SHEET_CSV_URL }}
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/briefing.json
          if git diff --staged --quiet; then
            echo "No briefing changes."
          else
            git commit -m "chore: update market briefing"
            git push
          fi
